<!-- /public/vite.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" role="img" aria-label="heartdata">
  <defs>
    <!-- Heart shape for clipping -->
    <clipPath id="clip-heart">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4c1.74 0 3.41 1.01 4.22 2.61C11.09 5.01 12.76 4 14.5 4 17 4 19 6 19 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </clipPath>
    <!-- Brand-ish gradient (teal → cyan). Change stops to rebrand. -->
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Data bars clipped inside the heart -->
  <g clip-path="url(#clip-heart)" opacity="0.95">
    <rect x="12.9" y="9.5" width="1.6" height="9.2" rx="0.4" fill="url(#g)"/>
    <rect x="15.6" y="8.0" width="1.6" height="10.7" rx="0.4" fill="url(#g)"/>
    <rect x="18.3" y="6.2" width="1.6" height="12.5" rx="0.4" fill="url(#g)"/>
  </g>

  <!-- Heart outline (solid for favicon clarity) -->
  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4c1.74 0 3.41 1.01 4.22 2.61C11.09 5.01 12.76 4 14.5 4 17 4 19 6 19 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
        fill="none" stroke="#0f172a" stroke-width="1.7"/>
</svg>
